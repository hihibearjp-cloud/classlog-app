    const ClassroomLogApp = () => {
      
      // 💡 系統自訂對話框 (取代原生 alert/confirm/prompt)
      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', message: '', value: '', onConfirm: null, onCancel: null });
      const showAlert = (message) => setDialog({ isOpen: true, type: 'alert', message, value: '', onConfirm: () => setDialog({isOpen: false}), onCancel: null });
      const showConfirm = (message, onConfirm) => setDialog({ isOpen: true, type: 'confirm', message, value: '', onConfirm: () => { setDialog({isOpen: false}); onConfirm(); }, onCancel: () => setDialog({isOpen: false}) });

      // 💡 判定是否為管理員/設計者 (使用您專屬密碼登入的人)

      const [isChecking, setIsChecking] = useState(false); 

      const handleLogin = async (e) => {
        e.preventDefault();
        const inputStr = passcodeInput.trim();
        if (!inputStr) return;

        const loginSuccess = (adminFlag = false) => {
          setIsAuthorized(true);
          setIsAdmin(adminFlag);
          localStorage.setItem('louisaAppAuth', 'true');
          
          if (adminFlag) {
              localStorage.setItem('louisaAppAdmin', 'true');
          } else {
              localStorage.removeItem('louisaAppAdmin');

          setIsChecking(false);
          
          const joke = coldJokes[Math.floor(Math.random() * coldJokes.length)];
          setRandomJokeText(joke);
          setShowWelcomeJoke(true);
        };

        if (inputStr === window.MASTER_PASSWORD) {
           loginSuccess(true);
           return;
        }

        if (!window.SHEET_CSV_URL || window.SHEET_CSV_URL.includes('xxxxxxxxxxxxxxxxxxxx')) {
           setPasscodeError(true);
           setPasscodeInput('');
           return;
        }
        
        setIsChecking(true);
        setPasscodeError(false);

        try {
          const fetchUrl = window.SHEET_CSV_URL + (window.SHEET_CSV_URL.includes('?') ? '&' : '?') + 'nocache=' + new Date().getTime();
          const response = await fetch(fetchUrl);
          if (!response.ok) throw new Error('Network response was not ok');
          
          const text = await response.text();
          const validPasswords = text.split('\n')
            .map(row => row.split(',')[0].replace('\r', '').trim())
            .filter(pwd => pwd !== '');

          if (validPasswords.includes(inputStr)) {
            loginSuccess(false);
          } else {
            setPasscodeError(true);
            setPasscodeInput('');
          }
        } catch (error) {
          console.error("Fetch password failed:", error);
          showAlert('無法連線到雲端密碼系統！\n請確定 Google 試算表網址設定正確，或檢查網路。');
          setPasscodeError(true);
        } finally {
          setIsChecking(false);
        }
      };

      const handleLogout = () => {
        showConfirm('確定要鎖定系統嗎？下次進入需要重新輸入通行碼。', () => {
          setIsAuthorized(false);
          setIsAdmin(false);
          localStorage.removeItem('louisaAppAuth');
          localStorage.removeItem('louisaAppAdmin');
          setPasscodeInput('');

                  systemInstruction: { parts: [{ text: systemPrompt }] }
              };

              const fetchWithRetry = async (url, options, maxRetries = 2) => {
                  const delays = [1000, 2000];
                  for (let i = 0; i < maxRetries; i++) {
                      try {
                          const response = await fetch(url, options);
                          if (!response.ok) {
                              const errData = await response.json().catch(() => ({}));
                              const errMsg = errData.error?.message || `HTTP ${response.status} 錯誤`;
                              const err = new Error(errMsg);
                              if (response.status >= 400 && response.status < 500) err.isClientError = true;
                              if (response.status === 429) err.isQuotaError = true;
                              throw err;
                          }
                          return await response.json();
                      } catch (error) {
                          if (error.isClientError || i === maxRetries - 1) throw error;
                          await new Promise(resolve => setTimeout(resolve, delays[i]));
                      }
                  }
              };

              const modelsToTry = ['gemini-1.5-flash', 'gemini-1.5-flash-8b'];
              let aiText = null;
              let lastError = null;

              for (const model of modelsToTry) {
                  try {
                      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                      const result = await fetchWithRetry(url, {
                          method: 'POST',
                          headers: { 'Content-Type': 'application/json' },
                          body: JSON.stringify(payload)
                      });
                      aiText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                      if (aiText) break;
                  } catch (err) {
                      lastError = err;
                      if (err.message.includes('API key not valid')) break; 
                  }
              }

              if (aiText) {
                  finalGeneratedText = aiText.trim();
              } else {
                  throw lastError || new Error("無法連線到 AI 模型");
              }
              
          } catch (error) {
              console.warn("AI 發生錯誤或未設定金鑰，啟動離線智能備援模式：", error.message);

                    const hasName = Boolean(roster[seat]);
                    return (
                      <button key={seat} onClick={() => toggleSeatSelection(seat)} className={`aspect-square rounded-xl sm:rounded-2xl border-[2.5px] flex flex-col items-center justify-center p-1 sm:p-2 transition-all shadow-sm ${isSelected ? 'bg-[#FFB7B2] border-[#5C3A21] shadow-[2px_2px_0_#5C3A21] sm:shadow-[3px_3px_0_#5C3A21] -translate-y-1 text-[#5C3A21]' : hasName ? 'bg-white border-[#D5C8BA] hover:border-[#5C3A21] text-[#5C4535]' : 'bg-gray-50 border-gray-200 text-gray-300'}`}>
                        <span className="text-xs sm:text-sm font-black mb-0.5 opacity-80">{seat}</span>
                        <span className="text-[13px] sm:text-[16px] font-black truncate w-full text-center tracking-tight sm:tracking-wide">{roster[seat] || '-'}</span>
                      </button>
                    );
                  })}
                </div>
                
                <div className="p-4 border-t-[3px] border-[#D5C8BA] bg-[#F4EDE4] rounded-b-[28px]">
                  <button onClick={confirmStudentSelection} className="w-full py-4 min-h-[60px] bg-[#5C3A21] text-[#FFFBF5] rounded-xl font-black text-xl tracking-widest shadow-[4px_4px_0_#3E2C20] active:shadow-none active:translate-y-1 active:translate-x-1 transition-all">確定選取 ({tempSelectedSeats.length}人)</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<ClassroomLogApp />);
  </script>
</body>
</html>
