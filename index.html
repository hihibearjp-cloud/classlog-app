      img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));

  <!-- 引入 Tailwind CSS 與 Babel -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 引入 Google 手寫風字體 (Klee One) -->

  <style>
    body { overscroll-behavior-y: none; -webkit-overflow-scrolling: touch; background-color: #F4EDE4; }
    .custom-scrollbar::-webkit-scrollbar { display: none; }
    .custom-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .action-btn { transition: all 0.15s ease; }
    .action-btn:active { transform: scale(0.97); }
    .guide-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    
    /* 專屬簽名檔樣式：手寫、粗體、斜體 */

      font-family: 'Klee One', 'Comic Sans MS', 'Chalkboard SE', cursive;

      border: 2.5px solid #5C3A21 !important;

      stroke: #5C3A21 !important;

      transform: translate(4px, 4px) !important;

      background-image: linear-gradient(rgba(0,0,0,0.05), rgba(0,0,0,0.05)); 
    }

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0';
    import { Calendar, FileText, Download, Trash2, Edit2, Plus, Save, AlertCircle, CheckSquare, Square, Clock, Filter, FileSpreadsheet, Settings, HelpCircle, X, Users, Upload, Database, AlertTriangle, Bell, PlusCircle, MessageCircle, Copy, CheckCircle2, Send, Smartphone, BookOpen, Lightbulb, ListChecks, ArrowRight, Zap, MessageSquare } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0';

    // --- 預設語錄資料庫 ---
    const defaultTemplates = {
      '正向鼓勵與生活關懷': [
        "今天在校表現優異，主動參與討論且態度積極，值得鼓勵！",
        "近期課堂積極舉手發言，答題正確率提升。請家長在家多給予肯定，建立孩子自信！",
        "今日大掃除非常認真，負責區域一塵不染，展現極佳責任感，值得表揚！"
      ],
      '學習習慣與常規提醒': [
        "今日上課認真，可惜忘了帶課本/文具。建議睡前提醒孩子整理書包，養成檢查習慣。",
        "近期在校參與度高，但打掃易與同學聊天分心。已提醒『先完成份內工作』，請家長協助叮嚀。",
        "在校與同學相處融洽，但作業/聯絡簿偶有遺漏。請家長協助檢視書寫狀況，培養責任感。",
        "課堂專注度與參與度仍有進步空間。請家長協助提醒上課專心，鼓勵主動完成任務。"
      ],
      '生活作息與突發狀況': [
        "今日上課略顯疲累。擔心過度使用3C影響專注與視力，建議家長與孩子約定使用時間。",
        "今日情緒較波動，與同學發生口角。已引導『先停下來再溝通』，請家長多留意孩子心情。",
        "今日到校時間較晚，易錯過晨間宣導。為確保學習步調，懇請家長協助提醒早點出門。",
        "今日在校反映身體不適，已至健康中心休息觀察。請家長留意後續狀況，必要時多休息。",
        "今日尚未到校，想確認是否身體不適或需請假？再請家長回覆或致電告知，謝謝。",
        "近期上課精神不佳，老師有些擔心。再請家長協助留意孩子的居家作息與睡眠時間。",
        "孩子近期有遲到情形，請家長協助調整作息，培養準時到校的習慣。",
        "若有請假需求，請務必依規定完成手續，以利學校掌握學生出缺席狀況。"
      ],
      '班級與學校配合事項': [
        "明日有體育課，請提醒孩子穿著體育服裝到校。",
        "學校發放之重要通知或回條，請家長留意內容、簽名，並提醒孩子準時交回。",
        "下週即將進行評量，請家長協助督促孩子在家複習，預祝考試順利！",
        "近期早晚溫差大，請提醒孩子多帶保暖衣物，注意健康。",
        "本週五為學校班親會，誠摯邀請家長踴躍參與，一同關心孩子學習狀況！",
        "重要事項請家長與孩子一同確認，感謝配合學校事務，共同協助孩子成長。"
      ],
      '作業與考試表現': [
        "孩子有作業未準時繳交，請家長協助督促按時完成。",
        "作業是學習的重要環節，建議養成每日檢查與整理的習慣。",
        "若有缺交情形，請儘速完成補交，以免影響學習進度。",
        "近期測驗表現仍有加強空間，建議多加複習課堂內容。",
        "可協助孩子規劃讀書時間，培養穩定的複習習慣。"
      ],
      '結語 (文末附加)': [
        "感謝家長的支持與配合，讓我們一起協助孩子持續進步。",
        "若有任何問題，歡迎隨時與老師聯繫，共同關心孩子成長。"
      ]
    };

    const ClassroomLogApp = () => {
      // --- 系統基礎設定 ---
      useEffect(() => {
        document.body.style.overscrollBehaviorY = 'none';
        return () => { document.body.style.overscrollBehaviorY = 'auto'; };
      }, []);

      const getWeekday = (dateString) => {
        const days = ['日', '一', '二', '三', '四', '五', '六'];
        return days[new Date(dateString).getDay()];
      };

      const defaultGradeOptions = ['一上', '一下', '二上', '二下', '三上', '三下'];
      const periodOptions = ['早修', '一', '二', '三', '四', '午餐', '午休', '五', '六', '七', '八'];
      const incidentCategoryOptions = ['1. 拒學/中輟', '2. 自傷/自殺', '3. 藥物濫用', '4. 性侵/性騷擾', '5. 家暴/兒虐', '6. 哀傷/失落', '7. 家庭/親子', '8. 情緒困擾', '9. 人際困擾', '10. 學習困擾', '11. 精神疾患', '12. 特教', '13. 偏差行為', '14. 性別/感情', '15. 生涯議題', '16. 其他'];
      const defaultNotifiedOptions = ['父', '母', '資源班老師', '專輔老師', '學務處'];

      // --- 狀態管理 ---
      
      // 動態學生人數 (預設 35)
      const [studentCount, setStudentCount] = useState(() => {
        const saved = localStorage.getItem('louisaClassroomStudentCount');
        return saved ? parseInt(saved, 10) : 35;
      });
      const seatOptions = Array.from({ length: studentCount }, (_, i) => String(i + 1));

      const [roster, setRoster] = useState(() => {
        const saved = localStorage.getItem('louisaClassroomRoster');
        return saved ? JSON.parse(saved) : { '1': '周杰倫', '2': '王力宏', '5': '蔡依林', '10': '孫燕姿', '11': '陳奕迅', '12': '梁靜茹' };
      });

      const [logs, setLogs] = useState(() => {
        const saved = localStorage.getItem('louisaClassroomLogs');
        return saved ? JSON.parse(saved) : [];
      });

      const [notifiedOptions, setNotifiedOptions] = useState(() => {
        const saved = localStorage.getItem('louisaNotifiedOptions');
        return saved ? JSON.parse(saved) : defaultNotifiedOptions;
      });

      const [templates, setTemplates] = useState(() => {
        const saved = localStorage.getItem('louisaClassroomTemplates_v4');
        return saved ? JSON.parse(saved) : defaultTemplates;
      });

      // 年級選單狀態 (支援自訂並存入 LocalStorage)
      const [gradeOptions, setGradeOptions] = useState(() => {
        const saved = localStorage.getItem('louisaGradeOptions');
        return saved ? JSON.parse(saved) : defaultGradeOptions;
      });

      useEffect(() => { localStorage.setItem('louisaClassroomStudentCount', studentCount.toString()); }, [studentCount]);
      useEffect(() => { localStorage.setItem('louisaClassroomRoster', JSON.stringify(roster)); }, [roster]);
      useEffect(() => { localStorage.setItem('louisaClassroomLogs', JSON.stringify(logs)); }, [logs]);
      useEffect(() => { localStorage.setItem('louisaNotifiedOptions', JSON.stringify(notifiedOptions)); }, [notifiedOptions]);
      useEffect(() => { localStorage.setItem('louisaClassroomTemplates_v4', JSON.stringify(templates)); }, [templates]);
      useEffect(() => { localStorage.setItem('louisaGradeOptions', JSON.stringify(gradeOptions)); }, [gradeOptions]);

      const [activeTab, setActiveTab] = useState('contact'); 
      
      const [filterSeat, setFilterSeat] = useState('');
      const [exportFilterSeat, setExportFilterSeat] = useState('');
      const [selectedForExport, setSelectedForExport] = useState([]);

      const [showStudentModal, setShowStudentModal] = useState(false);
      const [studentModalTarget, setStudentModalTarget] = useState('new'); 
      const [editingLog, setEditingLog] = useState(null);

      const [tempSelectedSeats, setTempSelectedSeats] = useState([]);
      const [batchImportText, setBatchImportText] = useState('');
      const [customPartyInput, setCustomPartyInput] = useState('');
      const fileInputRef = useRef(null);

      const [newLog, setNewLog] = useState({
        date: new Date().toISOString().split('T')[0], period: '', grade: gradeOptions[0] || '一上', seatNumber: '', type: 'general', incidentCategories: [], notifiedParties: [], student: '', content: '', teacher: '導師'
      });

      const [contactSeat, setContactSeat] = useState('');
      const [contactCategory, setContactCategory] = useState(() => Object.keys(templates)[0] || '');
      const [contactSelectedTemplateIdx, setContactSelectedTemplateIdx] = useState('');
      const [contactDraft, setContactDraft] = useState('');
      const [isCopied, setIsCopied] = useState(false);
      
      const [settingManageCategory, setSettingManageCategory] = useState(() => Object.keys(templates)[0] || '');

      // --- 邏輯功能 ---
      const openStudentModal = (target) => {
        setStudentModalTarget(target);
        let currentSeats = [];
        if (target === 'new' && newLog.seatNumber) currentSeats = newLog.seatNumber.split(', ');
        if (target === 'edit' && editingLog.seatNumber) currentSeats = editingLog.seatNumber.split(', ');
        if (target === 'contact' && contactSeat) currentSeats = contactSeat.split(', ');
        setTempSelectedSeats(currentSeats);
        setShowStudentModal(true);
      };

      const toggleSeatSelection = (seat) => setTempSelectedSeats(prev => prev.includes(seat) ? prev.filter(s => s !== seat) : [...prev, seat].sort((a,b) => parseInt(a) - parseInt(b)));

      const confirmStudentSelection = () => {
        const seatString = tempSelectedSeats.join(', ');
        const studentString = tempSelectedSeats.map(seat => roster[seat] || '').filter(Boolean).join(', ');
        
        if (studentModalTarget === 'new') {
          setNewLog(prev => ({ ...prev, seatNumber: seatString, student: studentString || prev.student }));
        } else if (studentModalTarget === 'edit') {
          setEditingLog(prev => ({ ...prev, seatNumber: seatString, student: studentString || prev.student }));
        } else if (studentModalTarget === 'contact') {
          setContactSeat(seatString);
        }
        setShowStudentModal(false);
      };

      const handleAddLog = (e) => {
        e.preventDefault();
        if (!newLog.content || (!newLog.student && !newLog.seatNumber && newLog.student !== '全班')) return alert('請填寫對象與事件內容。');
        setLogs([{ id: Date.now(), ...newLog }, ...logs]);
        setNewLog({ ...newLog, period: '', seatNumber: '', type: 'general', incidentCategories: [], notifiedParties: [], student: '', content: '' });
        alert('紀錄已儲存。');
      };

      const handleEditSave = (e) => {
        e.preventDefault();
        if (!editingLog.content || (!editingLog.student && !editingLog.seatNumber && editingLog.student !== '全班')) return alert('請填寫對象與事件內容。');
        setLogs(logs.map(l => l.id === editingLog.id ? editingLog : l));
        setEditingLog(null);
        alert('修改已儲存成功。');
      };

      const handleDelete = (id) => {
        if (confirm('確定刪除此紀錄嗎？此動作無法復原。')) {
          setLogs(logs.filter(log => log.id !== id));
          setSelectedForExport(selectedForExport.filter(exportId => exportId !== id));
        }
      };

      const toggleCategory = (category, target) => {
        const updater = target === 'new' ? setNewLog : setEditingLog;
        updater(prev => {
          const current = prev.incidentCategories || [];
          return { ...prev, incidentCategories: current.includes(category) ? current.filter(c => c !== category) : [...current, category] };
        });
      };

      const toggleParty = (party, target) => {
        const updater = target === 'new' ? setNewLog : setEditingLog;
        updater(prev => {
          const current = prev.notifiedParties || [];
          return { ...prev, notifiedParties: current.includes(party) ? current.filter(p => p !== party) : [...current, party] };
        });
      };

      const handleAddCustomParty = (e, target) => {
        e.preventDefault();
        const trimmed = customPartyInput.trim();
        if (trimmed && !notifiedOptions.includes(trimmed)) {
          setNotifiedOptions([...notifiedOptions, trimmed]);
          toggleParty(trimmed, target);
        }
        setCustomPartyInput('');
      };

      const handleBatchImport = () => {
        if(!batchImportText.trim()) return;
        const names = batchImportText.split('\n').map(n => n.trim()).filter(n => n);
        const newRoster = { ...roster };
        const newCount = Math.max(studentCount, names.length);
        setStudentCount(newCount);
        names.forEach((name, index) => { newRoster[String(index + 1)] = name; });
        setRoster(newRoster); setBatchImportText(''); 
        alert(`成功匯入 ${names.length} 筆學生姓名！班級總人數已自動調整為 ${newCount} 人。`);
      };

      const handleBackupJSON = () => {
        const blob = new Blob([JSON.stringify({ studentCount, roster, logs, notifiedOptions, templates, gradeOptions, exportDate: new Date().toISOString() }, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a'); link.href = url;
        link.download = `手札備份_${new Date().toISOString().split('T')[0]}.json`; link.click(); URL.revokeObjectURL(url);
      };

      const handleRestoreJSON = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.roster && data.logs && confirm('警告：這將會覆蓋您目前的資料。確定要還原嗎？')) {
              setRoster(data.roster); setLogs(data.logs); 
              if (data.studentCount) setStudentCount(data.studentCount);
              if (data.notifiedOptions) setNotifiedOptions(data.notifiedOptions);
              if (data.gradeOptions) setGradeOptions(data.gradeOptions);
              if (data.templates) {
                setTemplates(data.templates);
                const firstCat = Object.keys(data.templates)[0] || '';
                setContactCategory(firstCat); setSettingManageCategory(firstCat);
              }
              alert('資料還原成功！');
            } else if (!data.roster || !data.logs) alert('檔案格式錯誤，缺少必要資料。');
          } catch (err) { alert('解析檔案失敗，請確定這是一個正確的 JSON 備份檔。'); }
        };
        reader.readAsText(file); e.target.value = ''; 
      };

      const handleClearAllData = () => {
        if (confirm('⚠️ 將會清除系統內「所有」的日誌與名單資料！確定嗎？') && confirm('二次確認：資料清除後將【永遠無法復原】，確定？')) {
          setLogs([]); setRoster({}); setNotifiedOptions(defaultNotifiedOptions); setTemplates(defaultTemplates); setStudentCount(35); setGradeOptions(defaultGradeOptions);
          setContactCategory(Object.keys(defaultTemplates)[0] || ''); setSettingManageCategory(Object.keys(defaultTemplates)[0] || '');
          localStorage.removeItem('louisaClassroomLogs'); localStorage.removeItem('louisaClassroomRoster'); localStorage.removeItem('louisaNotifiedOptions'); localStorage.removeItem('louisaClassroomTemplates'); localStorage.removeItem('louisaClassroomTemplates_v2'); localStorage.removeItem('louisaClassroomTemplates_v3'); localStorage.removeItem('louisaClassroomTemplates_v4'); localStorage.removeItem('louisaClassroomStudentCount'); localStorage.removeItem('louisaGradeOptions');
          alert('🧹 資料已徹底清除。');
        }
      };

      const handleExportExcel = () => {
        let csvContent = '\uFEFF日期,星期,節次,年級,座號,姓名,類型,事件細項,通知對象,內容,紀錄教師\n';
        const data = filterSeat ? logs.filter(log => log.seatNumber?.split(', ').includes(filterSeat)) : logs;
        [...data].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(log => {
          const row = [log.date, getWeekday(log.date), log.period || '', log.grade || '', `"${log.seatNumber || ''}"`, `"${log.student || ''}"`, log.type === 'incident' ? '偶發事件' : '一般班務', `"${log.incidentCategories?.join('、') || ''}"`, `"${log.notifiedParties?.join('、') || ''}"`, `"${(log.content || '').replace(/"/g, '""')}"`, log.teacher || ''];
          csvContent += row.join(",") + "\n";
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement("a");
        link.href = URL.createObjectURL(blob); link.download = `親師聯絡&輔導手札_${filterSeat ? `${filterSeat}號` : '總表'}_${new Date().toISOString().split('T')[0]}.csv`; link.click();
      };

      const handleExportWord = () => {
        if (selectedForExport.length === 0) return alert('請先勾選要匯出的項目。');
        const exportData = logs.filter(log => selectedForExport.includes(log.id)).sort((a, b) => new Date(a.date) - new Date(b.date));

        });
        htmlContent += `</table></body></html>`;
        const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' }); const link = document.createElement('a');

                          }

                        <button onClick={() => {
                          if(Object.keys(templates).length <= 1) return alert('必須保留至少一個分類！');
                          if(confirm(`確定要刪除「${settingManageCategory}」分類及其所有語錄嗎？`)) {
                            const newTemplates = {...templates}; delete newTemplates[settingManageCategory]; setTemplates(newTemplates);
                            const nextCat = Object.keys(newTemplates)[0] || ''; setSettingManageCategory(nextCat); setContactCategory(nextCat);
                          }
                        }} className="bg-white border-2 border-[#C84B31] text-[#C84B31] px-3 py-2.5 rounded-xl font-black hover:bg-[#FADBD8] whitespace-nowrap"><Trash2 size={16} className="inline mr-1"/>刪除</button>
                      </div>
                    </div>
                    <div className="border-t-2 border-[#D5C8BA] pt-5">
                       {templates[settingManageCategory]?.length === 0 ? <div className="text-center text-[#A08C7D] py-6 font-bold text-sm">此分類尚無語錄，請點擊下方按鈕新增。</div> : null}
                       <div className="space-y-3 mb-4 max-h-[40vh] overflow-y-auto pr-2 custom-scrollbar">
                         {templates[settingManageCategory]?.map((tpl, idx) => (
                           <div key={idx} className="flex gap-2">
                             <textarea value={tpl} onChange={(e) => { const newTemplates = {...templates}; newTemplates[settingManageCategory][idx] = e.target.value; setTemplates(newTemplates); }} className="flex-1 border-2 border-[#EADDCE] rounded-xl p-3 outline-none text-sm leading-relaxed text-[#5C4535] focus:border-[#8B5A2B] resize-y min-h-[80px]"></textarea>
                             <button onClick={() => { if(confirm('確定刪除此則語錄？')) { const newTemplates = {...templates}; newTemplates[settingManageCategory].splice(idx, 1); setTemplates(newTemplates); } }} className="text-[#D5C8BA] hover:text-[#C84B31] self-start mt-2 p-1"><X size={20}/></button>
                           </div>
                         ))}
                       </div>
                       <button onClick={() => {
                         const newTemplates = {...templates};
                         if(!newTemplates[settingManageCategory]) newTemplates[settingManageCategory] = [];
                         newTemplates[settingManageCategory].push("");
                         setTemplates(newTemplates);
                       }} className="w-full bg-[#F4EDE4] text-[#8B5A2B] py-3 rounded-xl font-black border-2 border-[#D5C8BA] hover:bg-[#EADDCE] flex items-center justify-center gap-2"><Plus size={18}/> 新增一則空白語錄</button>
                    </div>
                 </div>

                 <div className="bg-[#FFFBF5] border-2 border-[#EADDCE] rounded-3xl p-6 shadow-sm">
                    <h3 className="text-lg font-black flex gap-2 mb-4 text-[#8B5A2B]"><Database size={20}/> 資料存檔管理</h3>
                    <div className="flex flex-col sm:flex-row gap-4 mb-6">
                      <button onClick={handleBackupJSON} className="flex-1 bg-[#8B5A2B] text-white py-3 rounded-xl font-black border-b-4 border-[#4A2E16] active:translate-y-1"><Download className="inline mr-2" size={18}/>下載備份(JSON)</button>
                      <button onClick={()=>fileInputRef.current.click()} className="flex-1 bg-[#EADDCE] text-[#5C3A21] py-3 rounded-xl font-black border-b-4 border-[#C8B6A6] active:translate-y-1"><Upload className="inline mr-2" size={18}/>上傳還原</button>
                      <input type="file" accept=".json" ref={fileInputRef} onChange={handleRestoreJSON} className="hidden" />
                    </div>
                    <button onClick={handleClearAllData} className="w-full border-2 border-[#C84B31] text-[#C84B31] py-2.5 rounded-xl font-black hover:bg-[#FADBD8]"><Trash2 className="inline mr-2" size={16}/>清除所有資料(重置系統)</button>
                 </div>
              </div>
            )}
          </main>

          {/* === 專屬簽名檔 === */}
          <footer className="w-full text-center pb-8 pt-4">
            <div className="signature-text text-[#8B5A2B] text-xl opacity-70 hover:opacity-100 transition-opacity select-none cursor-default">
              Regigi✍️@04/2026
            </div>
          </footer>

          {/* 全螢幕學生選擇 Modal (完美支援複選) */}
          {showStudentModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-[#3E2C20]/60 backdrop-blur-sm p-4 animate-fade-in">
              <div className="bg-[#FFFBF5] border-2 border-[#8B5A2B] w-full max-w-2xl rounded-2xl flex flex-col max-h-[85vh] shadow-2xl">
                
                <div className="p-4 border-b border-[#D5C8BA] flex justify-between items-center bg-[#EADDCE] rounded-t-xl">
                  <h3 className="font-bold flex items-center gap-2 text-[#5C3A21]">
                    <Users size={18}/> 
                    {studentModalTarget === 'contact' ? '選擇發送對象 (支援多選)' : '選擇對象 (支援多選)'}
                  </h3>
                  <button onClick={()=>setShowStudentModal(false)} className="text-[#8B5A2B] hover:text-[#5C3A21] transition-colors"><X size={24}/></button>
                </div>

                {studentModalTarget === 'contact' && (
                  <div className="bg-[#FFDAC1] text-[#5C3A21] px-5 py-2 font-bold text-sm border-b border-[#D5C8BA] shadow-inner">
                    💡 提示：點擊按鈕即可複選，完成後將自動合併名稱。
                  </div>
                )}
                
                <div className="p-4 overflow-y-auto flex-1 grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
                  {seatOptions.map(seat => {
                    const isSelected = tempSelectedSeats.includes(seat);
                    return (
                      <button key={seat} onClick={() => toggleSeatSelection(seat)} 
                        className={`relative p-3 rounded-xl border-2 flex flex-col items-center transition-all ${
                          isSelected 
                            ? 'border-[#8B5A2B] bg-[#8B5A2B] text-white shadow-md transform scale-105' 
                            : 'border-[#D5C8BA] bg-white text-[#5C4535] hover:border-[#8B5A2B]'
                        }`}>
                        <span className="font-mono text-xs opacity-80 mb-0.5">{seat}號</span>
                        <span className="font-bold whitespace-nowrap overflow-hidden text-ellipsis w-full text-center text-[15px]">
                          {roster[seat] || '未建檔'}
                        </span>
                        {isSelected && <CheckSquare size={16} className="absolute top-1 right-1 opacity-90" />}
                      </button>
                    );
                  })}
                </div>
                
                <div className="p-4 border-t border-[#D5C8BA] flex justify-between items-center bg-[#F4EDE4] rounded-b-xl">
                  <span className="font-black text-[#5C3A21]">已選取 <span className="text-[#C84B31]">{tempSelectedSeats.length}</span> 人</span>
                  <div className="flex gap-3">
                    <button onClick={()=>setTempSelectedSeats([])} className="px-4 py-2 font-black text-[#8B5A2B] hover:text-[#5C3A21]">清空</button>
                    <button onClick={confirmStudentSelection} className="px-8 py-2.5 bg-[#8B5A2B] text-white font-black rounded-xl border-b-4 border-[#4A2E16] active:translate-y-1 active:border-b-0 hover:bg-[#5C3A21]">完成選取</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 編輯紀錄 Modal */}
          {editingLog && (
            <div className="fixed inset-0 z-40 flex items-center justify-center bg-[#3E2C20]/60 backdrop-blur-sm p-4 animate-fade-in overflow-y-auto">
               <div className="bg-[#FFFBF5] border-2 border-[#8B5A2B] w-full max-w-4xl rounded-2xl flex flex-col max-h-[90vh]">
                  <div className="p-4 border-b border-[#D5C8BA] flex justify-between bg-[#EADDCE]"><h3 className="font-black text-xl flex items-center gap-2"><Edit2 size={20}/> 編輯紀錄</h3><button onClick={() => setEditingLog(null)}><X size={24}/></button></div>
                  <div className="p-6 overflow-y-auto">
                     <form onSubmit={handleEditSave} className="space-y-4">
                       <textarea value={editingLog.content} onChange={e=>setEditingLog({...editingLog, content:e.target.value})} rows="6" className="w-full border-2 border-[#D5C8BA] rounded-xl p-3 outline-none"></textarea>
                       <div className="flex gap-4">
                         <div className="w-1/4 border-2 border-[#D5C8BA] bg-white rounded-xl p-2">
                            <label className="block text-[11px] text-[#8B5A2B] font-bold">修改年級</label>
                            <select value={editingLog.grade} onChange={(e) => handleGradeChange(e, true)} className="w-full bg-transparent outline-none text-base font-bold text-[#3E2C20] py-1 cursor-pointer">
                              {gradeOptions.map(g => <option key={g} value={g}>{g}</option>)}
                              <option disabled>──────────</option>
                              <option value="custom_new_grade">➕ 自訂年級 (新增)</option>
                            </select>
                         </div>
                         <button type="button" onClick={()=>setEditingLog(null)} className="flex-1 bg-[#F4EDE4] py-3 rounded-xl font-black border-b-4 border-[#D5C8BA]">取消</button>
                         <button type="submit" className="flex-1 bg-[#8B5A2B] text-white py-3 rounded-xl font-black border-b-4 border-[#4A2E16]">儲存修改</button>
                       </div>
                     </form>
                  </div>
               </div>
            </div>
          )}

        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<ClassroomLogApp />);
  </script>
</body>
</html>
